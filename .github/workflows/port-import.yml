name: Deploy to Port

on:
  push:
    branches: [main]
    paths:
      - 'production-config/**'
      - '.github/workflows/port-import.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Import entities to Port
        env:
          PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
          PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.parse
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          entities_path = Path("${{ github.workspace }}/production-config/entities.json")
          entities = json.loads(entities_path.read_text(encoding="utf-8"))

          def normalize_base(base: str) -> str:
              return base.rstrip("/")

          def get_api_base() -> str:
              candidates = []
              for env_name in ("PORT_API_BASE_URL", "PORT_BASE_URL"):
                  value = os.environ.get(env_name)
                  if value:
                      candidates.append(value)
              candidates.extend([
                  "https://api.getport.io/v1",
                  "https://api.port.io/v1",
                  "https://api.us.port.io/v1",
              ])

              for candidate in candidates:
                  base = normalize_base(candidate)
                  auth_url = f"{base}/auth/access_token"
                  payload = json.dumps({
                      "clientId": os.environ["PORT_CLIENT_ID"],
                      "clientSecret": os.environ["PORT_CLIENT_SECRET"],
                  }).encode("utf-8")
                  req = Request(auth_url, data=payload, headers={"Content-Type": "application/json"}, method="POST")
                  try:
                      with urlopen(req, timeout=60) as response:
                          data = json.load(response)
                      if data.get("accessToken"):
                          print(f"Using Port API base URL: {base}")
                          return base
                  except HTTPError as exc:
                      if exc.code not in {404, 405, 422}:
                          raise
                      print(f"Skipping Port API base URL {base}: HTTP {exc.code}")
                  except URLError as exc:
                      print(f"Skipping Port API base URL {base}: {exc}")

              raise SystemExit("Unable to reach a valid Port API authentication endpoint")

          api_base = get_api_base()
          access_token = None
          for candidate in [api_base]:
              auth_url = f"{candidate}/auth/access_token"
              payload = json.dumps({
                  "clientId": os.environ["PORT_CLIENT_ID"],
                  "clientSecret": os.environ["PORT_CLIENT_SECRET"],
              }).encode("utf-8")
              req = Request(auth_url, data=payload, headers={"Content-Type": "application/json"}, method="POST")
              try:
                  with urlopen(req, timeout=60) as response:
                      data = json.load(response)
                  access_token = data["accessToken"]
                  break
              except HTTPError as exc:
                  error_body = exc.read().decode("utf-8", "ignore")
                  raise SystemExit(f"Port authentication failed for {candidate}: {exc.code} {error_body}") from exc

          headers = {
              "Authorization": f"Bearer {access_token}",
              "Content-Type": "application/json",
          }

          for index, entity in enumerate(entities, start=1):
              blueprint = entity.get("blueprint")
              entity_id = entity.get("identifier")
              if not blueprint:
                  raise SystemExit(f"Entity {index} is missing a blueprint")
              if not entity_id:
                  raise SystemExit(f"Entity {index} is missing an identifier")

              collection_endpoint = f"{api_base}/blueprints/{urllib.parse.quote(blueprint)}/entities/"
              entity_endpoint = f"{api_base}/blueprints/{urllib.parse.quote(blueprint)}/entities/{urllib.parse.quote(entity_id)}"
              create_body = json.dumps(entity).encode("utf-8")
              update_body = json.dumps({
                  "identifier": entity.get("identifier"),
                  "title": entity.get("title"),
                  "properties": entity.get("properties", {}),
                  "relations": entity.get("relations", {}),
              }).encode("utf-8")

              for attempt in range(3):
                  try:
                      req = Request(collection_endpoint, data=create_body, headers=headers, method="POST")
                      with urlopen(req, timeout=120) as response:
                          response.read()
                      break
                  except HTTPError as exc:
                      if exc.code == 409:
                          for update_method in ("PATCH", "PUT"):
                              try:
                                  req = Request(entity_endpoint, data=update_body, headers=headers, method=update_method)
                                  with urlopen(req, timeout=120) as response:
                                      response.read()
                                  break
                              except HTTPError as update_exc:
                                  if update_exc.code == 404 and update_method == "PATCH":
                                      continue
                                  error_body = update_exc.read().decode("utf-8", "ignore")
                                  raise SystemExit(f"Update failed for {entity_id} ({blueprint}): {update_exc.code} {error_body}") from update_exc
                          else:
                              raise SystemExit(f"Update failed for {entity_id} ({blueprint})")
                          break
                      if exc.code in {429, 500, 502, 503, 504} and attempt < 2:
                          time.sleep(2 ** attempt)
                          continue
                      error_body = exc.read().decode("utf-8", "ignore")
                      raise SystemExit(f"Import failed for {entity_id} ({blueprint}): {exc.code} {error_body}") from exc
                  except URLError as exc:
                      if attempt < 2:
                          time.sleep(2 ** attempt)
                          continue
                      raise SystemExit(f"Import failed for {entity_id} ({blueprint}): {exc}") from exc

              if index % 100 == 0:
                  print(f"Imported {index}/{len(entities)} entities")

          print(f"Completed import of {len(entities)} entities")
          PY

      - name: Deployment Success
        if: success()
        run: echo "✅ Port deployment completed successfully"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Port deployment failed"
          exit 1