name: Deploy to Port

on:
  push:
    branches: [main]
    paths:
      - 'production-config/**'
      - '.github/workflows/port-import.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Port entities payload
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          payload_path = Path("${{ github.workspace }}/production-config/entities.json")
          payload = payload_path.read_text()
          delimiter = "PORT_ENTITIES_EOF_20260626"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"PORT_ENTITIES<<{delimiter}\n")
              env_file.write(payload)
              if not payload.endswith("\n"):
                  env_file.write("\n")
              env_file.write(f"{delimiter}\n")
          PY

      - name: Deploy blueprints to Port
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: BULK_UPSERT
          entities: ${{ env.PORT_ENTITIES }}

      - name: Deployment Success
        if: success()
        run: echo "✅ Port deployment completed successfully"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Port deployment failed"
          exit 1