name: Import Port Config

on:
  push:
    branches:
      - main
    paths:
      - 'production-config/**'

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Port CLI
        run: npm install -g @port-experimental/port-cli
      
      - name: Create tar.gz from config
        run: tar -czf production-config.tar.gz production-config/
      
      - name: Import to Port
        env:
          PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
          PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }}
          PORT_API_URL: https://api.us.getport.io/v1
        run: port import --input production-config.tar.gz
