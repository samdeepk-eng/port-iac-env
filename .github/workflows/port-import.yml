name: Import Port Config

on:
  push:
    branches:
      - main
    paths:
      - 'production-config/**'

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Port CLI
        run: npm install -g @port-experimental/port-cli

      - name: Create tar.gz from config
        run: |
          cd production-config
          tar -czf ../production-config.tar.gz .

      - name: Import to Port
        run: |
          port import \
            --input production-config.tar.gz \
            --target-api-url https://api.us.getport.io/v1 \
            --target-client-id ${{ secrets.PORT_CLIENT_ID }} \
            --target-client-secret ${{ secrets.PORT_CLIENT_SECRET }} \
            --skip-entities \
            --yes \
            --verbose