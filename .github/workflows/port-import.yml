name: Import Port Config

on:
  push:
    branches:
      - main
    paths:
      - 'production-config/**'

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Port CLI
        run: npm install -g @port-experimental/port-cli
      
      - name: Create Port config
        run: |
          mkdir -p ~/.port
          cat > ~/.port/config.yaml << 'EOF'
          default_org: production
          organizations:
            production:
              client_id: ${{ secrets.PORT_CLIENT_ID }}
              client_secret: ${{ secrets.PORT_CLIENT_SECRET }}
              api_url: https://api.us.getport.io/v1
          EOF
      
      - name: Create tar.gz from config
        run: tar -czf production-config.tar.gz production-config/
      
      - name: Import to Port
        run: port import --input production-config.tar.gz