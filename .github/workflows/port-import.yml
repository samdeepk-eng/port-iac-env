name: Import Port Config

on:
  push:
    branches:
      - main
    paths:
      - 'production-config/**'

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Port CLI
        run: npm install -g @port-experimental/port-cli

      - name: Create tar.gz from config
        run: |
          cd production-config
          tar -czf ../production-config.tar.gz .

      - name: Create Port CLI config
        run: |
          mkdir -p ~/.port
          cat > ~/.port/config.yaml << EOF
          default_org: sam-testing
          organizations:
            sam-testing:
              client_id: ${{ secrets.PORT_CLIENT_ID }}
              client_secret: ${{ secrets.PORT_CLIENT_SECRET }}
              api_url: https://api.us.getport.io/v1
          backend:
            url: https://api.us.getport.io/v1
            timeout: 300
          EOF

      - name: Import to Port
        run: |
          port import \
            --input production-config.tar.gz \
            --skip-entities \
            --yes \
            --verbose